name = "openmark"
main = "worker.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "openmark.cc/*", zone_name = "openmark.cc" }
]

[assets]
directory = "./dist"
binding = "ASSETS"

[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "openmark-pdf-temp"

[vars]
PDF2MARKDOWN_API_URL = "https://pdf2html.templify.cloud"

[placement]
mode = "smart"

[observability]
[observability.logs]
enabled = true
invocation_logs = true