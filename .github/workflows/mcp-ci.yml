name: MCP CI

on:
  pull_request:
    paths: ['mcp/**']
  push:
    branches: [main]
    paths: ['mcp/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
